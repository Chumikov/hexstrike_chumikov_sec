name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    name: Tests (Python 3.13)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        # v6+ runs on Node.js 24 (v5 was the first to adopt Node 24).
        # Eliminates the "Node.js 20 actions are deprecated" warning.
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        # v6+ runs on Node.js 24 (matches the checkout bump).
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        # Green pytest only — no hard coverage gate yet.
        # The --cov-fail-under threshold (>=70%) arrives in T6 / v7.0.0.
        run: pytest

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          if-no-files-found: ignore
