[pytest]
# Repo root on sys.path so `import hexstrike_mcp` / `import hexstrike_server` work
pythonpath = .

testpaths = tests

# Collect only unit tests for now (integration suite arrives in later releases)
addopts =
    -ra
    --strict-markers
    --cov=hexstrike_mcp
    --cov=hexstrike_server
    --cov-report=term-missing
    # No --cov-fail-under in v6.3.0: green pytest only.
    # Hard coverage threshold (>=70%) is introduced in T6 / v7.0.0.

markers =
    unit: lightweight unit tests of pure functions (no I/O, no mocks)
    slow: tests that take noticeably longer (e.g. importing the 742KB server module)

filterwarnings =
    ignore::DeprecationWarning
